name: Keep Render Alive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render API
        env:
          RENDER_URL: ${{ secrets.RENDER_API_URL }}
        run: |
          curl -sf --max-time 30 "${RENDER_URL}/health" || echo "ping failed, retrying..."
          curl -sf --max-time 60 "${RENDER_URL}/health" || true
